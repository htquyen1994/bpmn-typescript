<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSP BPMN – Custom Properties Panel Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: system-ui, sans-serif; }
    body { display: flex; flex-direction: column; background: #f9f9f9; }

    /* ── Toolbar ──────────────────────────────────────────────────────────── */
    .toolbar {
      display: flex; gap: 8px; padding: 8px 12px;
      background: #f4f4f5; border-bottom: 1px solid #d4d4d8;
      flex-wrap: wrap; align-items: center; flex-shrink: 0;
    }
    .toolbar-title {
      font-weight: 700; font-size: 14px; color: #18181b; margin-right: 8px;
    }
    .toolbar button {
      padding: 5px 12px; border: 1px solid #a1a1aa; border-radius: 4px;
      background: #fff; cursor: pointer; font-size: 12px; color: #333;
    }
    .toolbar button:hover { background: #e4e4e7; }
    .toolbar button.primary {
      background: #1a73e8; color: #fff; border-color: #1a73e8;
    }
    .toolbar button.primary:hover { background: #1557b0; }

    /* ── Main layout ──────────────────────────────────────────────────────── */
    .main { display: flex; flex: 1; min-height: 0; overflow: hidden; }

    /* BPMN canvas — takes up most of the space */
    #diagram-container { flex: 1; position: relative; min-width: 0; }

    /* Custom properties panel */
    #custom-panel-container {
      width: 280px;
      min-width: 280px;
      overflow-y: auto;
      border-left: 1px solid #e0e0e0;
      background: #fafafa;
    }

    /* Event log */
    #output {
      width: 300px; min-width: 300px; padding: 10px; overflow-y: auto;
      background: #1e1e2e; color: #cdd6f4; font-family: monospace;
      font-size: 11px; white-space: pre-wrap; border-left: 1px solid #313244;
    }

    /* ── Hint bar ─────────────────────────────────────────────────────────── */
    .hint {
      padding: 6px 14px;
      background: #fffbeb;
      border-bottom: 1px solid #fcd34d;
      font-size: 12px;
      color: #78350f;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <span class="toolbar-title">Custom Properties Panel Demo</span>
    <button id="btn-validate" class="primary">Validate</button>
    <button id="btn-get-values">Get Values</button>
    <button id="btn-zoom-fit">Fit</button>
    <button id="btn-zoom-in">Zoom +</button>
    <button id="btn-zoom-out">Zoom −</button>
    <button id="btn-undo">Undo</button>
    <button id="btn-redo">Redo</button>
    <a href="index.html" style="margin-left:auto;font-size:12px;color:#555;">← Back to main demo</a>
  </div>

  <div class="hint">
    Click a <strong>User Task</strong> or <strong>Service Task</strong> to see custom properties in the right panel.
    The <em>Assignee</em> field simulates an async API call (500 ms delay).
  </div>

  <div class="main">
    <div id="diagram-container"></div>
    <div id="custom-panel-container"></div>
    <pre id="output">Events…
</pre>
  </div>

  <script type="module" src="./custom-panel-main.ts"></script>
</body>
</html>
